<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Me - Leonardo Carôlo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Finlandica+Headline:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="navbar.css">
  <link rel="stylesheet" href="contacts.css">
</head>

<body>
  <div id="navbar-container"></div>

    <div class="contacts-layout">
      <section class="contact-info">
        <h2>Let's Connect</h2>
        <p class="intro">
          Whether you have questions about my work, or just want to say hello, 
          feel free to reach out. I'd love to hear from you!
        </p>

        <div class="info-cards">
          <div class="info-card">
            <h3>Email</h3>
            <p><a href="mailto:contact@leonardocarolo.com">leonardoapcarolo@outlook.com</a></p>
          </div>

          <div class="info-card">
            <h3>Phone</h3>
            <p><a href="tel:+351912345678">+351 91 070 6882</a></p>
          </div>

          <div class="info-card">
            <h3>Location</h3>
            <p>Leiria, Portugal</p>
          </div>

          <div class="info-card">
            <h3>Social Media</h3>
            <div class="social-links">
              <a href="https://www.instagram.com/silvercoastauto_photography/" target="_blank">Instagram</a>

            </div>
          </div>
        </div>
      </section>

      <section class="contact-form-section">
        <form action="#" method="POST" class="contact-form">
          <div class="form-group">
            <label for="name">Your Name</label>
            <input type="text" id="name" name="name" required placeholder="John Doe">
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="your@email.com">
          </div>

          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" required placeholder="What is this about?">
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" required placeholder="Your message here..."></textarea>
          </div>

          <button type="submit" class="submit-btn">Send Message</button>
        </form>
      </section>
    </div>
  </div>

  <script src="navbar.js"></script>
</body>

</html>
