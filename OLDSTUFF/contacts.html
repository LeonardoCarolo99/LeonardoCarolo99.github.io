<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts - Leonardo Carôlo</title>
    <link rel="stylesheet" href="contacts.css">
    <link rel="stylesheet" href="navbar.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Finlandica+Headline:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  </head>
<body>

  <div id="navbar-container"></div>

  <div class="contacts-container">
    <main class="contacts-layout">
      
      <section class="info-panel">
        <span class="subtitle">Get in Touch</span>
        <h1>Let's work together</h1>
        <p class="description">
          Available for automotive shoots, motorsport events coverage, and commercial projects. Drop a message or reach out directly via email.
        </p>
        
        <div class="direct-contacts">
          <div class="contact-card">
            <span class="card-label">Email</span>
            <a href="mailto:leonardoapcarolo@outlook.com" class="card-value">leonardoapcarolo@outlook.com</a>
          </div>
          <div class="contact-card">
            <span class="card-label">Instagram</span>
            <a href="https://www.instagram.com/silvercoastauto_photography/" target="_blank" class="card-value">@silvercoastauto_photography</a>
          </div>
        </div>
      </section>

      <section class="form-panel">
        <form action="#" method="POST" class="contact-form">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required placeholder="Your name">
          </div>
          
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="your@email.com">
          </div>
          
          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" required placeholder="How can I help you?">
          </div>
          
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" required placeholder="Tell me about your project..."></textarea>
          </div>
          
          <button type="submit" class="submit-btn">Send Message</button>
        </form>
      </section>

    </main>
  </div>


  <script src="navbar.js"></script>
</body>
</html>
